name: WakeMeUpiOS
options:
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: 6.0
    IPHONEOS_DEPLOYMENT_TARGET: 17.0
    DEVELOPMENT_LANGUAGE: en
targets:
  WakeMeUp:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: WakeMeUp
        excludes:
          - Resources/**
    resources:
      - path: WakeMeUp/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.howell623.wakemeup
        PRODUCT_NAME: WakeMeUp
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: WakeMeUp
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_NSUserNotificationsUsageDescription: WakeMeUp uses local notifications for patrol reminders and check-ins.
        INFOPLIST_KEY_CFBundleAllowMixedLocalizations: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: 1,2
        CODE_SIGN_STYLE: Automatic
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.1.0
  WakeMeUpTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: WakeMeUpTests
    dependencies:
      - target: WakeMeUp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.howell623.wakemeup.tests
        GENERATE_INFOPLIST_FILE: YES

